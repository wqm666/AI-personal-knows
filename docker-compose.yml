services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personalknow}
      POSTGRES_USER: ${POSTGRES_USER:-personalknow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-personalknow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8081}:8081"
    volumes:
      - ./config.json:/app/config.json:ro
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-personalknow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-personalknow}?sslmode=disable
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

volumes:
  pgdata:
